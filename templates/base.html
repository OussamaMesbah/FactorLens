<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}FactorLens — Factor Portfolio Replicator{% endblock %}</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Plotly -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>
        :root {
            --bg-primary: #0D1117;
            --bg-secondary: #161B22;
            --bg-card: #1C2128;
            --bg-card-hover: #21262D;
            --border: #30363D;
            --text-primary: #E6EDF3;
            --text-muted: #8B949E;
            --accent-blue: #388BFD;
            --accent-amber: #F0883E;
            --accent-green: #3FB950;
            --accent-red: #F85149;
            --accent-purple: #BC8CFF;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            min-height: 100vh;
        }

        /* ---- Navbar ---- */
        .navbar {
            background: var(--bg-secondary) !important;
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1.5rem;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.02em;
            color: var(--text-primary) !important;
        }

        .navbar-brand span {
            color: var(--accent-blue);
        }

        .nav-link {
            color: var(--text-muted) !important;
            font-size: 0.85rem;
        }

        .nav-link:hover {
            color: var(--text-primary) !important;
        }

        /* ---- Cards ---- */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
        }

        .card-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            padding: 0.75rem 1.25rem;
            border-radius: 10px 10px 0 0 !important;
        }

        /* ---- Metric tiles ---- */
        .metric-tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.1rem 1.25rem;
            transition: border-color .2s;
        }

        .metric-tile:hover {
            border-color: var(--accent-blue);
        }

        .metric-tile .label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .metric-tile .value {
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1;
        }

        .metric-tile .sub {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 3px;
        }

        /* ---- Badges ---- */
        .badge-buy {
            background: rgba(63, 185, 80, .18);
            color: var(--accent-green);
            border: 1px solid rgba(63, 185, 80, .35);
        }

        .badge-sell {
            background: rgba(248, 81, 73, .18);
            color: var(--accent-red);
            border: 1px solid rgba(248, 81, 73, .35);
        }

        .badge-hold {
            background: rgba(139, 148, 158, .13);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        /* ---- Table ---- */
        .table {
            color: var(--text-primary);
            font-size: 0.84rem;
        }

        .table thead th {
            background: var(--bg-secondary);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.72rem;
            letter-spacing: .05em;
            border-bottom: 1px solid var(--border);
        }

        .table tbody tr {
            border-bottom: 1px solid var(--border);
        }

        .table tbody tr:hover td {
            background: var(--bg-card-hover);
            cursor: default;
        }

        .table td,
        .table th {
            padding: 0.55rem 0.85rem;
            vertical-align: middle;
        }

        .table-striped>tbody>tr:nth-of-type(odd)>* {
            background: rgba(255, 255, 255, .02);
        }

        /* ---- Tabs ---- */
        .nav-tabs {
            border-bottom: 1px solid var(--border);
        }

        .nav-tabs .nav-link {
            color: var(--text-muted);
            border: none;
            padding: .55rem 1rem;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .nav-tabs .nav-link.active {
            background: transparent;
            color: var(--text-primary);
            border-bottom: 2px solid var(--accent-blue);
        }

        .nav-tabs .nav-link:hover:not(.active) {
            color: var(--text-primary);
            background: transparent;
        }

        /* ---- Buttons ---- */
        .btn-primary {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #1f6feb;
            border-color: #1f6feb;
        }

        .btn-outline-secondary {
            border-color: var(--border);
            color: var(--text-muted);
        }

        .btn-outline-secondary:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            border-color: var(--border);
        }

        /* ---- Forms ---- */
        .form-control,
        .form-select {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .form-control:focus,
        .form-select:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(56, 139, 253, .25);
            color: var(--text-primary);
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        .form-text {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* ---- Spinner ---- */
        .spinner-border {
            width: 2rem;
            height: 2rem;
        }

        /* ---- Upload zone ---- */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 2.5rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--accent-blue);
            background: rgba(56, 139, 253, .05);
        }

        .upload-zone .bi {
            font-size: 2.5rem;
            color: var(--text-muted);
        }

        /* ---- Misc ---- */
        .positive {
            color: var(--accent-green);
        }

        .negative {
            color: var(--accent-red);
        }

        .text-muted {
            color: var(--text-muted) !important;
        }

        code {
            background: var(--bg-secondary);
            color: var(--accent-amber);
            padding: .1em .4em;
            border-radius: 4px;
            font-size: 0.82em;
        }

        .factor-pill {
            display: inline-block;
            padding: .2em .65em;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid var(--border);
            margin: 2px;
            color: var(--text-muted);
            background: var(--bg-secondary);
        }

        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 1rem;
            padding-bottom: .5rem;
            border-bottom: 1px solid var(--border);
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
    </style>

    {% block head %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-graph-up me-2"></i>Factor<span>Lens</span>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/" title="New analysis">
                            <i class="bi bi-plus-circle me-1"></i>New Analysis
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link"
                            href="https://www.aqr.com/Insights/Research/Journal-Article/Superstar-Investors"
                            target="_blank" title="Read the AQR paper">
                            <i class="bi bi-file-earmark-text me-1"></i>AQR Paper
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="py-4">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-muted py-4 mt-4" style="border-top:1px solid var(--border);font-size:.75rem;">
        Factor<strong>Lens</strong> — Factor replication based on
        <em>Brooks, Tsuji &amp; Villalon (2019) — "Superstar Investors"</em>.
        For educational purposes only. Not financial advice.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
